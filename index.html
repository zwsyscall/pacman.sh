<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>pamac</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        body {
            background-color: #000;
            background-image: url("images/stars2.png");
            font-family: 'source-code-pro', 'Courier New', monospace;
            color: rgb(45, 211, 45);
            margin: 0;
            padding: 0;
        }

        p,
        h1,
        h2,
        h3,
        h4,
        h5,
        h6,
        li {
            color: rgb(45, 211, 45);
        }

        a {
            color: rgb(116, 255, 116);
            text-decoration: underline;
        }

        pre {
            background: #1a1a1a;
            padding: 15px;
            border: 1px solid rgb(45, 211, 45);
            border-radius: 5px;
            overflow-x: auto;
            font-size: 1rem;
        }

        code {
            font-family: inherit;
            background: #1a1a1a;
            color: rgb(116, 255, 116);
            padding: 2px 6px;
            border-radius: 3px;
            border: 1px solid #2f3136;
            font-size: 0.95em;
        }

        pre code {
            padding: 0;
            background: transparent;
            border: none;
            border-radius: 0;
            color: inherit;
        }

        #menu {
            background: #2f3136;
            position: fixed;
            border-radius: 5px;
            padding: 12px;
            padding-top: 2px;
            padding-bottom: 2px;
            width: 190px;
            top: 50px;
            left: 50px;
            max-height: 80vh;
            overflow-y: auto;
        }

        #menu h2 {
            margin-top: 15px;
            font-size: 1.2rem;
            border-bottom: 1px solid rgb(45, 211, 45);
            padding-bottom: 5px;
        }

        .post-link {
            display: block;
            padding: 10px 0;
            border-bottom: 1px dashed rgb(45, 211, 45);
        }

        .post-date {
            font-size: 0.8rem;
            color: rgb(45, 211, 45);
            display: block;
            opacity: 0.7;
            margin-top: 4px;
        }

        #content-wrapper {
            margin-left: 270px;
            margin-top: 50px;
            padding-right: 40px;
            padding-bottom: 100px;
        }

        #content {
            max-width: 750px;
            margin: 0 auto;
            line-height: 1.7;
        }

        #content h1 {
            font-size: 2.3rem;
            margin-top: 0;
            border-bottom: 2px solid rgb(45, 211, 45);
            padding-bottom: 10px;
        }

        #content h2 {
            font-size: 1.8rem;
            margin-top: 1.8rem;
        }

        #content p,
        #content li {
            font-size: 1.15rem;
            margin-bottom: 1.2rem;
        }

        img {
            width: 25%;
            height: auto;
            position: fixed;
            bottom: 0px;
            right: 0px;
            z-index: 10;
        }

        #content table {
            width: 100%;
            border-collapse: collapse;
            margin: 20px 0;
            font-size: 1.1rem;
        }

        #content th,
        #content td {
            border: 1px solid rgb(45, 211, 45);
            padding: 10px;
            text-align: left;
        }

        #content th {
            background: #1a1a1a;
            font-weight: bold;
            border-bottom: 2px solid rgb(45, 211, 45);
        }

        #content tr:hover {
            background: #0d260d;
        }

        .img-hover-container {
            position: relative;
            display: inline-block;
            margin: 0 4px;
        }

        .img-hover-link {
            color: rgb(116, 255, 116) !important;
            font-weight: bold;
            text-decoration: underline;
            cursor: pointer;
        }

        .img-hover-popup {
            display: none;
            position: absolute !important;
            top: 25px !important;
            left: 0 !important;
            bottom: auto !important;
            right: auto !important;
            width: auto !important;
            max-width: 500px;
            max-height: 500px;
            border: 2px solid rgb(45, 211, 45);
            background-color: #000;
            z-index: 999;
            box-shadow: 0px 4px 20px rgba(0, 0, 0, 0.9);
            pointer-events: none;
        }

        .img-hover-container:hover .img-hover-popup {
            display: block;
        }

        @media (max-width: 768px) {

            #menu {
                position: relative;
                top: 0;
                left: 0;
                width: calc(100% - 40px);
                max-width: none;
                margin: 20px;
                box-sizing: border-box;
                max-height: 250px;
            }

            #content-wrapper {
                margin-left: 0;
                margin-top: 20px;
                padding: 0 20px 60px 20px;
            }

            #content h1 {
                font-size: 1.8rem;
            }

            #content h2 {
                font-size: 1.4rem;
            }

            #content p,
            #content li {
                font-size: 1.05rem;
            }

            img {
                display: none;
            }

            .img-hover-popup {
                max-width: 90vw;
                max-height: 60vh;
            }
        }
    </style>
</head>

<body>

    <div id="menu">
        <h2>help</h2>
        <div id="nav-links"></div>
    </div>

    <div id="content-wrapper">
        <div id="content">Initializing...</div>
    </div>

    <script>
        let globalPosts = [];

        async function init() {
            try {
                const res = await fetch(`metadata.json?v=${new Date().getTime()}`);
                globalPosts = await res.json();
            } catch (err) {
                document.getElementById('content').innerHTML = "<h1>Error: missing metadata.json</h1><p>Did the GitHub Action run successfully?</p>";
                return;
            }

            const nav = document.getElementById('nav-links');

            globalPosts.forEach(post => {
                const link = document.createElement('a');
                link.href = `#${post.id}`;
                link.className = 'post-link';

                const dateObj = new Date(post.date);
                const formattedDate = dateObj.toLocaleDateString(undefined, { year: 'numeric', month: '2-digit', day: '2-digit' });

                link.innerHTML = `<strong>> ${post.title}</strong><span class="post-date">[${formattedDate}]</span>`;
                nav.appendChild(link);
            });

            handleRoute();
        }

        async function loadPost(file) {
            document.getElementById('content').innerHTML = "<p>Loading module...</p>";
            const res = await fetch(`${file}?v=${new Date().getTime()}`);
            const md = await res.text();
            document.getElementById('content').innerHTML = marked.parse(md);

            const postImages = document.querySelectorAll('#content img');
            postImages.forEach(img => {
                const src = img.getAttribute('src');
                const alt = img.getAttribute('alt') || 'Image';

                const wrapper = document.createElement('span');
                wrapper.className = 'img-hover-container';

                const link = document.createElement('a');
                link.href = src;
                link.className = 'img-hover-link';
                link.textContent = `[File: ${alt}]`;
                link.target = '_blank';

                img.className = 'img-hover-popup';

                img.parentNode.insertBefore(wrapper, img);
                wrapper.appendChild(link);
                wrapper.appendChild(img);
            });

            if (window.innerWidth <= 768) {
                document.getElementById('content-wrapper').scrollIntoView({ behavior: 'smooth' });
            }
        }

        function handleRoute() {
            const hash = window.location.hash.substring(1);
            const post = globalPosts.find(p => p.id === hash) || globalPosts[0];
            if (post) {
                loadPost(post.file);
            } else {
                document.getElementById('content').innerHTML = "<h1>404: Post not found</h1>";
            }
        }

        window.addEventListener('hashchange', handleRoute);
        init();
    </script>
</body>

</html>
