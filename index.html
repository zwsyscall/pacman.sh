<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>pamac</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        body {
            background-color: #000;
            background-image: url("images/stars2.png");
            font-family: 'source-code-pro', 'Courier New', monospace;
            color: rgb(45, 211, 45);
            margin: 0;
            padding: 0;
        }

        p,
        h1,
        h2,
        h3,
        h4,
        h5,
        h6,
        li {
            color: rgb(45, 211, 45);
        }

        a {
            color: rgb(116, 255, 116);
            text-decoration: underline;
        }

        pre {
            background: #1a1a1a;
            padding: 15px;
            border: 1px solid rgb(45, 211, 45);
            border-radius: 5px;
            overflow-x: auto;
            font-size: 1rem;
        }

        code {
            font-family: inherit;
        }

        #menu {
            background: #2f3136;
            position: fixed;
            border-radius: 5px;
            padding: 12px;
            padding-top: 2px;
            padding-bottom: 2px;
            width: 190px;
            top: 50px;
            left: 50px;
            max-height: 80vh;
            overflow-y: auto;
        }

        #menu h2 {
            margin-top: 15px;
            font-size: 1.2rem;
            border-bottom: 1px solid rgb(45, 211, 45);
            padding-bottom: 5px;
        }

        .post-link {
            display: block;
            padding: 10px 0;
            border-bottom: 1px dashed rgb(45, 211, 45);
        }

        .post-date {
            font-size: 0.8rem;
            color: rgb(45, 211, 45);
            display: block;
            opacity: 0.7;
            margin-top: 4px;
        }

        #content-wrapper {
            margin-left: 270px;
            margin-top: 50px;
            padding-right: 40px;
            padding-bottom: 100px;
        }

        #content {
            max-width: 750px;
            margin: 0 auto;
            line-height: 1.7;
        }

        #content h1 {
            font-size: 2.3rem;
            margin-top: 0;
            border-bottom: 2px solid rgb(45, 211, 45);
            padding-bottom: 10px;
        }

        #content h2 {
            font-size: 1.8rem;
            margin-top: 1.8rem;
        }

        #content p,
        #content li {
            font-size: 1.15rem;
            margin-bottom: 1.2rem;
        }

        img {
            width: 25%;
            height: auto;
            position: fixed;
            bottom: 0px;
            right: 0px;
            z-index: 10;
        }

        @media (max-width: 768px) {

            #menu {
                position: relative;
                top: 0;
                left: 0;
                width: calc(100% - 40px);
                max-width: none;
                margin: 20px;
                box-sizing: border-box;
                max-height: 250px;
            }

            #content-wrapper {
                margin-left: 0;
                margin-top: 20px;
                padding: 0 20px 60px 20px;
            }

            #content h1 {
                font-size: 1.8rem;
            }

            #content h2 {
                font-size: 1.4rem;
            }

            #content p,
            #content li {
                font-size: 1.05rem;
            }

            img {
                display: none;
            }
        }
    </style>
</head>

<body>

    <div id="menu">
        <h2>help</h2>
        <div id="nav-links"></div>
    </div>

    <div id="content-wrapper">
        <div id="content">Initializing...</div>
    </div>

    <script>
        let globalPosts = [];

        async function init() {
            try {
                const res = await fetch('metadata.json');
                globalPosts = await res.json();
            } catch (err) {
                document.getElementById('content').innerHTML = "<h1>Error: missing metadata.json</h1><p>Did the GitHub Action run successfully?</p>";
                return;
            }

            const nav = document.getElementById('nav-links');

            globalPosts.forEach(post => {
                const link = document.createElement('a');
                link.href = `#${post.id}`;
                link.className = 'post-link';

                const dateObj = new Date(post.date);
                const formattedDate = dateObj.toLocaleDateString(undefined, { year: 'numeric', month: '2-digit', day: '2-digit' });

                link.innerHTML = `<strong>> ${post.title}</strong><span class="post-date">[${formattedDate}]</span>`;
                nav.appendChild(link);
            });

            handleRoute();
        }

        async function loadPost(file) {
            document.getElementById('content').innerHTML = "<p>Loading module...</p>";
            const res = await fetch(file);
            const md = await res.text();
            document.getElementById('content').innerHTML = marked.parse(md);

            if (window.innerWidth <= 768) {
                document.getElementById('content-wrapper').scrollIntoView({ behavior: 'smooth' });
            }
        }

        function handleRoute() {
            const hash = window.location.hash.substring(1);
            const post = globalPosts.find(p => p.id === hash) || globalPosts[0];
            if (post) {
                loadPost(post.file);
            } else {
                document.getElementById('content').innerHTML = "<h1>404: Post not found</h1>";
            }
        }

        window.addEventListener('hashchange', handleRoute);
        init();
    </script>
</body>

</html>
